# Reviewed allowlist for cargo-audit.
# All entries are transitive dependencies from the Tauri v2 runtime (GTK3/glib/reqwest/hyper).
# Binder makes zero network requests and does not use the affected APIs directly.
# These will resolve when Tauri ships GTK4 support.
#
# Last reviewed: 2026-02-18

[advisories]
ignore = [
    # GTK3 bindings — unmaintained (Tauri ships GTK4 support in future release)
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0411", # cairo-rs
    "RUSTSEC-2024-0412", # cairo-sys-rs
    "RUSTSEC-2024-0417", # gdk
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0414", # gdk-pixbuf
    "RUSTSEC-2024-0415", # gdk-pixbuf-sys
    "RUSTSEC-2024-0419", # gtk
    "RUSTSEC-2024-0420", # gtk-sys

    # glib unsoundness (VariantStrIter) — Binder does not use this API
    "RUSTSEC-2024-0429", # glib

    # reqwest/hyper/h2 — Binder makes no network requests; these are Tauri runtime deps
    "RUSTSEC-2024-0370", # proc-macro-crate (unmaintained, build dep only)
    "RUSTSEC-2024-0384", # instant (unmaintained, Tauri transitive)
    "RUSTSEC-2025-0057", # fxhash (unmaintained, wry/selectors transitive)
    "RUSTSEC-2025-0075", # hyper-util (Tauri runtime, no network use)
    "RUSTSEC-2025-0080", # openssl (Tauri runtime, no network use)
    "RUSTSEC-2025-0081", # reqwest (Tauri runtime, no network use)
    "RUSTSEC-2025-0098", # glib-sys (unmaintained GTK3 binding)
    "RUSTSEC-2025-0100", # gio-sys (unmaintained GTK3 binding)
]
